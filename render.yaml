services:
  # ── Serviço Web (Backend + Frontend) ──
  - type: web
    name: dev-portfolio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-neon-db
          property: connectionString
      - key: ADMIN_TOKEN
        generateValue: true

  # ── Banco de Dados Neon ──
databases:
  - name: portfolio-neon-db
    databaseName: portfolio
    plan: free
    region: sa-east-1